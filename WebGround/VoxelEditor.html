<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Editor</title>
    <style>
        :root {
            /* Light Theme Defaults */
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --panel-border: rgba(0, 0, 0, 0.1);
            --btn-bg: #e8e8ed;
            --btn-hover: #d2d2d7;
            --btn-active: #0071e3;
            --btn-active-text: #ffffff;
            --accent-color: #0071e3;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #1a1a2e;
            --text-color: #f5f5f7;
            --panel-bg: rgba(30, 30, 40, 0.85);
            --panel-border: rgba(255, 255, 255, 0.1);
            --btn-bg: #2c2c3e;
            --btn-hover: #3a3a4c;
            --btn-active: #0a84ff;
            --btn-active-text: #ffffff;
            --accent-color: #0a84ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Minimalist UI Skeleton */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            z-index: 10;
            width: 250px;
        }

        .ui-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .ui-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--btn-bg);
            color: var(--text-color);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: var(--btn-hover);
        }

        .btn.active {
            background: var(--btn-active);
            color: var(--btn-active-text);
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #color-picker {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 0;
            overflow: hidden;
        }

        #color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        #color-picker::-webkit-color-swatch {
            border: none;
            border-radius: 8px;
        }
    </style>
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="ui-header">Voxel Editor</div>

        <div class="ui-row">
            <button id="btn-add" class="btn active">Add</button>
            <button id="btn-remove" class="btn">Remove</button>
        </div>

        <div class="color-picker-container">
            <label for="color-picker" style="font-size: 0.9rem; font-weight: 500;">Voxel Color</label>
            <input type="color" id="color-picker" value="#0071e3">
        </div>

        <div class="ui-row">
            <button id="btn-clear" class="btn">Clear Canvas</button>
        </div>

        <div class="ui-row" style="margin-top: 10px;">
            <button id="btn-theme" class="btn">Toggle Theme</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f7); // Default Light theme bg

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(50, 50, 50);
        camera.lookAt(0, 0, 0);

        // 3. Renderer Setup
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // 4. Lights
        const ambientLight = new THREE.AmbientLight(0x606060, 2);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
        directionalLight.position.set(50, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 500;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        scene.add(directionalLight);

        // 5. Base Grid / Plane
        const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.1;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        const geometry = new THREE.PlaneGeometry(100, 100);
        geometry.rotateX(- Math.PI / 2);
        const planeMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.8,
            metalness: 0.2,
            side: THREE.DoubleSide
        });
        const plane = new THREE.Mesh(geometry, planeMaterial);
        plane.receiveShadow = true;
        scene.add(plane);

        // Setup variables for controls
        let controls = null;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 6. Camera Controls (OrbitControls) - MagicaVoxel style
        controls = new OrbitControls(camera, renderer.domElement);
        // Right click to rotate, middle click to pan, left click to nothing (used for raycast)
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.NONE,
            MIDDLE: THREE.MOUSE.PAN,
            RIGHT: THREE.MOUSE.ROTATE
        };
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 7. Raycasting & Voxel Placement Logic
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        // Voxel Data
        const objects = [plane]; // Array of objects to raycast against
        window.editorObjects = objects; // Exported for clearing later

        let currentColor = 0x0071e3;
        window.editorCurrentColor = currentColor; // Exported for UI

        let isAddMode = true; // true = Add, false = Remove
        window.editorIsAddMode = isAddMode; // Exported for UI

        // Roll-over indicator (hover cube)
        const rollOverGeo = new THREE.BoxGeometry(1, 1, 1);
        const rollOverMaterial = new THREE.MeshBasicMaterial({
            color: 0xff0000,
            opacity: 0.5,
            transparent: true,
            depthWrite: false
        });
        const rollOverMesh = new THREE.Mesh(rollOverGeo, rollOverMaterial);
        scene.add(rollOverMesh);

        // Standard Voxel Geometry
        const cubeGeo = new THREE.BoxGeometry(1, 1, 1);

        // Listeners for mouse interactions
        container.addEventListener('pointermove', onPointerMove);
        container.addEventListener('pointerdown', onPointerDown);

        function onPointerMove(event) {
            // Calculate pointer position in normalized device coordinates (-1 to +1)
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(objects, false);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                if (isAddMode) {
                    // Position roll-over box slightly above the intersected face
                    rollOverMesh.position.copy(intersect.point).addScaledVector(intersect.face.normal, 0.5);
                    rollOverMesh.position.divideScalar(1).floor().multiplyScalar(1).addScalar(0.5);
                    rollOverMesh.visible = true;
                } else {
                    // Position roll-over box on the intersected voxel (if not plane)
                    if (intersect.object !== plane) {
                        rollOverMesh.position.copy(intersect.object.position);
                        rollOverMesh.visible = true;
                    } else {
                        rollOverMesh.visible = false;
                    }
                }
            } else {
                rollOverMesh.visible = false;
            }
        }

        function onPointerDown(event) {
            // Only respond to left click
            if (event.button !== 0) return;

            // Don't raycast if clicking on UI
            if (event.target.closest('#ui-panel')) return;

            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(objects, false);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                if (!isAddMode) {
                    // Remove Voxel
                    if (intersect.object !== plane) {
                        scene.remove(intersect.object);
                        objects.splice(objects.indexOf(intersect.object), 1);
                        // Hide rollover after removing until next move
                        rollOverMesh.visible = false;
                    }
                } else {
                    // Add Voxel
                    const cubeMaterial = new THREE.MeshStandardMaterial({
                        color: window.editorCurrentColor,
                        roughness: 0.5,
                        metalness: 0.1
                    });
                    const voxel = new THREE.Mesh(cubeGeo, cubeMaterial);

                    // Snap to grid based on normal
                    voxel.position.copy(intersect.point).addScaledVector(intersect.face.normal, 0.5);
                    voxel.position.divideScalar(1).floor().multiplyScalar(1).addScalar(0.5);

                    voxel.castShadow = true;
                    voxel.receiveShadow = true;

                    scene.add(voxel);
                    objects.push(voxel);
                }
            }
        }

        // 8. UI Interactions

        // Mode switching
        const btnAdd = document.getElementById('btn-add');
        const btnRemove = document.getElementById('btn-remove');

        btnAdd.addEventListener('click', () => {
            isAddMode = true;
            window.editorIsAddMode = isAddMode;
            btnAdd.classList.add('active');
            btnRemove.classList.remove('active');
        });

        btnRemove.addEventListener('click', () => {
            isAddMode = false;
            window.editorIsAddMode = isAddMode;
            btnRemove.classList.add('active');
            btnAdd.classList.remove('active');
        });

        // Color Picker
        const colorPicker = document.getElementById('color-picker');
        colorPicker.addEventListener('input', (e) => {
            currentColor = parseInt(e.target.value.replace('#', '0x'));
            window.editorCurrentColor = currentColor;
        });

        // Clear Canvas
        const btnClear = document.getElementById('btn-clear');
        btnClear.addEventListener('click', () => {
            // Keep the plane (index 0)
            while(objects.length > 1) {
                const voxel = objects.pop();
                scene.remove(voxel);
            }
        });

        // Theme Toggle
        const btnTheme = document.getElementById('btn-theme');
        let isDarkTheme = false;

        btnTheme.addEventListener('click', () => {
            isDarkTheme = !isDarkTheme;

            if (isDarkTheme) {
                document.documentElement.setAttribute('data-theme', 'dark');
                scene.background = new THREE.Color(0x1a1a2e);
            } else {
                document.documentElement.removeAttribute('data-theme');
                scene.background = new THREE.Color(0xf5f5f7);
            }
        });

    </script>
</body>
</html>
