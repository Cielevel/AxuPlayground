<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        :root {
            --text-main: #ffffff;
            --bg-deep: #000000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .bg-blur {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #ffea00 0%, #ff0055 30%, #000000 70%);
            filter: blur(120px); opacity: 0.3; z-index: -1;
            animation: rotate 40s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        h1 { font-size: 4rem; margin: 10px 0; font-weight: 900; letter-spacing: 5px; }
        .score { font-size: 2rem; margin-bottom: 20px; font-weight: 300; opacity: 0.8; }
        canvas {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <h1>PONG</h1>
    <div class="score"><span id="p1Score">0</span> : <span id="p2Score">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const p1ScoreEl = document.getElementById('p1Score');
        const p2ScoreEl = document.getElementById('p2Score');

        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 100;
        const BALL_SIZE = 10;

        let p1Score = 0;
        let p2Score = 0;

        let player = { x: canvas.width - 30, y: canvas.height/2 - PADDLE_HEIGHT/2, dy: 0 };
        let ai = { x: 20, y: canvas.height/2 - PADDLE_HEIGHT/2, dy: 0 };
        let ball = { x: canvas.width/2, y: canvas.height/2, dx: 5, dy: 5 };

        function resetBall() {
            ball.x = canvas.width/2;
            ball.y = canvas.height/2;
            ball.dx = -ball.dx;
            ball.dy = 5 * (Math.random() > 0.5 ? 1 : -1);
        }

        function update() {
            player.y += player.dy;
            if(player.y < 0) player.y = 0;
            if(player.y + PADDLE_HEIGHT > canvas.height) player.y = canvas.height - PADDLE_HEIGHT;

            // Simple AI
            let aiCenter = ai.y + PADDLE_HEIGHT/2;
            if(aiCenter < ball.y - 10) ai.y += 4;
            else if(aiCenter > ball.y + 10) ai.y -= 4;

            if(ai.y < 0) ai.y = 0;
            if(ai.y + PADDLE_HEIGHT > canvas.height) ai.y = canvas.height - PADDLE_HEIGHT;

            ball.x += ball.dx;
            ball.y += ball.dy;

            if(ball.y <= 0 || ball.y + BALL_SIZE >= canvas.height) ball.dy *= -1;

            // Player collision
            if(ball.x + BALL_SIZE >= player.x && ball.y + BALL_SIZE >= player.y && ball.y <= player.y + PADDLE_HEIGHT) {
                ball.dx = -Math.abs(ball.dx) - 0.5;
            }
            // AI collision
            if(ball.x <= ai.x + PADDLE_WIDTH && ball.y + BALL_SIZE >= ai.y && ball.y <= ai.y + PADDLE_HEIGHT) {
                ball.dx = Math.abs(ball.dx) + 0.5;
            }

            if(ball.x < 0) {
                p2Score++;
                p2ScoreEl.innerText = p2Score;
                resetBall();
            } else if (ball.x > canvas.width) {
                p1Score++;
                p1ScoreEl.innerText = p1Score;
                resetBall();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Center line
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            for(let i=0; i<canvas.height; i+=40) {
                ctx.fillRect(canvas.width/2 - 2, i+10, 4, 20);
            }

            ctx.fillStyle = '#00e5ff';
            ctx.fillRect(player.x, player.y, PADDLE_WIDTH, PADDLE_HEIGHT);

            ctx.fillStyle = '#ff0055';
            ctx.fillRect(ai.x, ai.y, PADDLE_WIDTH, PADDLE_HEIGHT);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
        }

        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') player.dy = -8;
            if(e.key === 'ArrowDown') player.dy = 8;
        });
        document.addEventListener('keyup', e => {
            if(e.key === 'ArrowUp' || e.key === 'ArrowDown') player.dy = 0;
        });

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
