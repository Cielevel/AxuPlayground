<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        :root {
            --text-main: #ffffff;
            --bg-deep: #000000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .bg-blur {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #00e5ff 0%, #4a00e0 30%, #000000 70%);
            filter: blur(120px); opacity: 0.4; z-index: -1;
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        h1 { font-size: 4rem; margin: 10px 0; font-weight: 900; letter-spacing: 2px; }
        .score { font-size: 1.5rem; margin-bottom: 20px; font-weight: 300; opacity: 0.8; }
        canvas {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <h1>SNAKE</h1>
    <div class="score">Score: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');

        const gridSize = 20;
        let snake = [{x: 10, y: 10}];
        let apple = {x: 15, y: 15};
        let velocity = {x: 0, y: 0};
        let nextVelocity = {x: 0, y: 0};
        let score = 0;

        function reset() {
            snake = [{x: 10, y: 10}];
            velocity = {x: 0, y: 0};
            nextVelocity = {x: 0, y: 0};
            score = 0;
            scoreEl.innerText = score;
            placeApple();
        }

        function placeApple() {
            apple = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize))
            };
            for(let cell of snake) {
                if(cell.x === apple.x && cell.y === apple.y) placeApple();
            }
        }

        function gameLoop() {
            velocity = nextVelocity;
            if(velocity.x !== 0 || velocity.y !== 0) {
                let head = {x: snake[0].x + velocity.x, y: snake[0].y + velocity.y};

                // Wrap around
                if (head.x < 0) head.x = (canvas.width / gridSize) - 1;
                if (head.x >= canvas.width / gridSize) head.x = 0;
                if (head.y < 0) head.y = (canvas.height / gridSize) - 1;
                if (head.y >= canvas.height / gridSize) head.y = 0;

                // Check collision
                for(let i=0; i<snake.length; i++) {
                    if(snake[i].x === head.x && snake[i].y === head.y) {
                        reset();
                        return;
                    }
                }

                snake.unshift(head);
                if(head.x === apple.x && head.y === apple.y) {
                    score += 10;
                    scoreEl.innerText = score;
                    placeApple();
                } else {
                    snake.pop();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff0055';
            ctx.beginPath();
            ctx.arc(apple.x*gridSize + gridSize/2, apple.y*gridSize + gridSize/2, gridSize/2.5, 0, Math.PI*2);
            ctx.fill();

            ctx.fillStyle = '#00e5ff';
            for(let i=0; i<snake.length; i++) {
                ctx.fillRect(snake[i].x*gridSize + 1, snake[i].y*gridSize + 1, gridSize-2, gridSize-2);
            }
        }

        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp' && velocity.y !== 1) nextVelocity = {x: 0, y: -1};
            if(e.key === 'ArrowDown' && velocity.y !== -1) nextVelocity = {x: 0, y: 1};
            if(e.key === 'ArrowLeft' && velocity.x !== 1) nextVelocity = {x: -1, y: 0};
            if(e.key === 'ArrowRight' && velocity.x !== -1) nextVelocity = {x: 1, y: 0};
        });

        setInterval(() => {
            gameLoop();
            draw();
        }, 100);
    </script>
</body>
</html>
