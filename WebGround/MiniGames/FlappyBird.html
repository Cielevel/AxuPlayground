<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        :root {
            --text-main: #ffffff;
            --bg-deep: #000000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .bg-blur {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #00e5ff 0%, #ffea00 30%, #000000 70%);
            filter: blur(120px); opacity: 0.3; z-index: -1;
            animation: rotate 60s linear infinite alternate;
        }
        @keyframes rotate { 100% { transform: rotate(180deg); } }
        h1 { font-size: 3rem; margin: 10px 0; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;}
        .score { font-size: 1.5rem; margin-bottom: 20px; font-weight: 300; opacity: 0.8; }
        canvas {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .instructions { margin-top: 10px; font-size: 1rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <h1>FLAPPY BIRD</h1>
    <div class="score">Score: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    <div class="instructions">Press Space or Tap to Fly</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');

        let bird = { x: 50, y: 150, radius: 12, velocity: 0, gravity: 0.25, jump: -5 };
        let pipes = [];
        let score = 0;
        let gameOver = false;
        let pipeWidth = 50;
        let pipeGap = 120;
        let frame = 0;

        function reset() {
            bird.y = 150;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            gameOver = false;
            frame = 0;
            scoreEl.innerText = score;
        }

        function drawBird() {
            ctx.fillStyle = '#ffea00';
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI*2);
            ctx.fill();
        }

        function drawPipes() {
            ctx.fillStyle = '#00ff55';
            for(let i=0; i<pipes.length; i++) {
                let p = pipes[i];
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
            }
        }

        function update() {
            if(gameOver) return;

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if(bird.y + bird.radius >= canvas.height || bird.y - bird.radius <= 0) {
                gameOver = true;
            }

            if(frame % 100 === 0) {
                let topH = Math.max(30, Math.random() * (canvas.height - pipeGap - 60));
                let bottomH = canvas.height - topH - pipeGap;
                pipes.push({ x: canvas.width, top: topH, bottom: bottomH, passed: false });
            }

            for(let i=0; i<pipes.length; i++) {
                let p = pipes[i];
                p.x -= 2;

                // Collision
                if(bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + pipeWidth) {
                    if(bird.y - bird.radius < p.top || bird.y + bird.radius > canvas.height - p.bottom) {
                        gameOver = true;
                    }
                }

                if(p.x + pipeWidth < bird.x && !p.passed) {
                    score++;
                    scoreEl.innerText = score;
                    p.passed = true;
                }
            }

            pipes = pipes.filter(p => p.x + pipeWidth > 0);
            frame++;
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            update();
            drawBird();
            drawPipes();

            if(gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
            }

            requestAnimationFrame(loop);
        }

        function flap() {
            if(gameOver) reset();
            else bird.velocity = bird.jump;
        }

        document.addEventListener('keydown', e => { if(e.code === 'Space') flap(); });
        canvas.addEventListener('touchstart', flap);
        canvas.addEventListener('mousedown', flap);

        loop();
    </script>
</body>
</html>
