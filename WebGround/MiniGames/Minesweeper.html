<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        :root {
            --text-main: #ffffff;
            --bg-deep: #000000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .bg-blur {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #00ff55 0%, #4a00e0 30%, #000000 70%);
            filter: blur(120px); opacity: 0.3; z-index: -1;
            animation: rotate 60s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(-360deg); } }
        h1 { font-size: 3rem; margin: 5px 0; font-weight: 900; letter-spacing: 2px; }
        .controls { margin-bottom: 20px; font-size: 1.2rem; display: flex; gap: 20px; align-items: center; }
        .board {
            display: grid;
            background: rgba(0, 0, 0, 0.4); padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 5px; backdrop-filter: blur(10px);
        }
        .cell {
            width: 30px; height: 30px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center;
            justify-content: center; font-weight: bold; cursor: pointer; user-select: none;
            transition: background 0.2s;
        }
        .cell:hover { background: rgba(255,255,255,0.2); }
        .cell.revealed { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); cursor: default; }
        .cell.mine { background: #ff0055; }
        .cell.flag { color: #ffea00; }
        button {
            padding: 8px 20px; font-size: 1rem; cursor: pointer;
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px; transition: all 0.3s;
        }
        button:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <h1>MINESWEEPER</h1>
    <div class="controls">
        <span>Flags: <span id="flagCount">10</span></span>
        <button onclick="init()">Restart</button>
    </div>
    <div class="board" id="board"></div>

    <script>
        const boardEl = document.getElementById('board');
        const flagEl = document.getElementById('flagCount');
        const ROWS = 10;
        const COLS = 10;
        const MINES = 10;

        let grid = [];
        let flags = 0;
        let gameOver = false;

        function init() {
            grid = [];
            flags = MINES;
            gameOver = false;
            flagEl.innerText = flags;
            boardEl.innerHTML = '';
            boardEl.style.gridTemplateColumns = `repeat(${COLS}, 30px)`;

            for(let r=0; r<ROWS; r++) {
                let row = [];
                for(let c=0; c<COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.addEventListener('click', handleClick);
                    cell.addEventListener('contextmenu', handleRightClick);
                    boardEl.appendChild(cell);
                    row.push({el: cell, mine: false, revealed: false, flagged: false, neighborMines: 0});
                }
                grid.push(row);
            }

            // Place mines
            let minesPlaced = 0;
            while(minesPlaced < MINES) {
                let r = Math.floor(Math.random() * ROWS);
                let c = Math.floor(Math.random() * COLS);
                if(!grid[r][c].mine) {
                    grid[r][c].mine = true;
                    minesPlaced++;
                }
            }

            // Calculate neighbors
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(!grid[r][c].mine) {
                        let count = 0;
                        for(let dr=-1; dr<=1; dr++) {
                            for(let dc=-1; dc<=1; dc++) {
                                let nr = r+dr, nc = c+dc;
                                if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && grid[nr][nc].mine) count++;
                            }
                        }
                        grid[r][c].neighborMines = count;
                    }
                }
            }
        }

        function handleClick(e) {
            if(gameOver) return;
            let r = parseInt(e.target.dataset.r);
            let c = parseInt(e.target.dataset.c);
            reveal(r, c);
        }

        function handleRightClick(e) {
            e.preventDefault();
            if(gameOver) return;
            let r = parseInt(e.target.dataset.r);
            let c = parseInt(e.target.dataset.c);
            let cell = grid[r][c];

            if(!cell.revealed) {
                if(!cell.flagged && flags > 0) {
                    cell.flagged = true;
                    cell.el.classList.add('flag');
                    cell.el.innerText = '⚑';
                    flags--;
                } else if(cell.flagged) {
                    cell.flagged = false;
                    cell.el.classList.remove('flag');
                    cell.el.innerText = '';
                    flags++;
                }
                flagEl.innerText = flags;
            }
        }

        function reveal(r, c) {
            if(r<0 || r>=ROWS || c<0 || c>=COLS) return;
            let cell = grid[r][c];
            if(cell.revealed || cell.flagged) return;

            cell.revealed = true;
            cell.el.classList.add('revealed');

            if(cell.mine) {
                cell.el.classList.add('mine');
                cell.el.innerText = '💣';
                gameOver = true;
                revealAll();
                setTimeout(() => alert('Game Over!'), 100);
            } else {
                if(cell.neighborMines > 0) {
                    cell.el.innerText = cell.neighborMines;
                    const colors = ['', '#00e5ff', '#00ff55', '#ffea00', '#ffaa00', '#ff0055', '#aa00ff', '#4a00e0', '#ffffff'];
                    cell.el.style.color = colors[cell.neighborMines];
                } else {
                    for(let dr=-1; dr<=1; dr++) {
                        for(let dc=-1; dc<=1; dc++) {
                            reveal(r+dr, c+dc);
                        }
                    }
                }
            }
        }

        function revealAll() {
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].mine) {
                        grid[r][c].el.classList.add('mine', 'revealed');
                        grid[r][c].el.innerText = '💣';
                    }
                }
            }
        }

        init();
    </script>
</body>
</html>
