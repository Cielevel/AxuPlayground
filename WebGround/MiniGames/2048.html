<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        :root {
            --text-main: #ffffff;
            --bg-deep: #000000;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .bg-blur {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #ffaa00 0%, #ff0055 30%, #000000 70%);
            filter: blur(120px); opacity: 0.3; z-index: -1;
            animation: rotate 60s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        h1 { font-size: 3rem; margin: 10px 0; font-weight: 900; letter-spacing: 5px; }
        .score { font-size: 1.5rem; margin-bottom: 20px; font-weight: 300; opacity: 0.8; }
        .grid {
            display: grid; grid-template-columns: repeat(4, 80px); grid-template-rows: repeat(4, 80px);
            gap: 10px; background: rgba(0, 0, 0, 0.4); padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .cell {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; border-radius: 5px;
            transition: all 0.15s ease-in-out;
        }
        .c2 { color: #eee; background: rgba(238,228,218,0.2); }
        .c4 { color: #eee; background: rgba(237,224,200,0.3); }
        .c8 { color: #f9f6f2; background: rgba(242,177,121,0.5); }
        .c16 { color: #f9f6f2; background: rgba(245,149,99,0.6); }
        .c32 { color: #f9f6f2; background: rgba(246,124,95,0.7); }
        .c64 { color: #f9f6f2; background: rgba(246,94,59,0.8); }
        .c128, .c256, .c512, .c1024, .c2048 { color: #f9f6f2; background: rgba(237,204,97,0.9); box-shadow: 0 0 10px rgba(237,204,97,0.5); font-size: 1.5rem;}
        button {
            margin-top: 20px; padding: 10px 30px; font-size: 1rem; cursor: pointer;
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; transition: all 0.3s;
        }
        button:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <h1>2048</h1>
    <div class="score">Score: <span id="scoreVal">0</span></div>
    <div class="grid" id="grid"></div>
    <button onclick="init()">Restart</button>

    <script>
        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('scoreVal');
        let board = [];
        let score = 0;

        function init() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            scoreEl.innerText = score;
            spawn(); spawn();
            render();
        }

        function spawn() {
            let empty = [];
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    if(board[r][c] === 0) empty.push({r, c});
                }
            }
            if(empty.length > 0) {
                let pos = empty[Math.floor(Math.random() * empty.length)];
                board[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            gridEl.innerHTML = '';
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    if(board[r][c] !== 0) {
                        cell.innerText = board[r][c];
                        cell.classList.add(`c${board[r][c]}`);
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = 4 - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            for(let i=0; i<3; i++) {
                if(row[i] !== 0 && row[i] === row[i+1]) {
                    row[i] *= 2;
                    row[i+1] = 0;
                    score += row[i];
                    scoreEl.innerText = score;
                }
            }
            return row;
        }

        function operate(row) {
            row = slide(row);
            row = combine(row);
            row = slide(row);
            return row;
        }

        function checkWinOrLose() {
            // Check win
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    if(board[r][c] === 2048) { setTimeout(() => alert('You Win!'), 100); return; }
                }
            }
            // Check lose
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    if(board[r][c] === 0) return;
                    if(c<3 && board[r][c] === board[r][c+1]) return;
                    if(r<3 && board[r][c] === board[r+1][c]) return;
                }
            }
            setTimeout(() => alert('Game Over!'), 100);
        }

        document.addEventListener('keydown', e => {
            let moved = false;
            if(e.key === 'ArrowLeft') {
                for(let r=0; r<4; r++) {
                    let old = [...board[r]];
                    board[r] = operate(board[r]);
                    if(board[r].join(',') !== old.join(',')) moved = true;
                }
            } else if(e.key === 'ArrowRight') {
                for(let r=0; r<4; r++) {
                    let old = [...board[r]];
                    board[r] = operate(board[r].reverse()).reverse();
                    if(board[r].join(',') !== old.join(',')) moved = true;
                }
            } else if(e.key === 'ArrowUp') {
                for(let c=0; c<4; c++) {
                    let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    let old = [...col];
                    col = operate(col);
                    if(col.join(',') !== old.join(',')) moved = true;
                    for(let r=0; r<4; r++) board[r][c] = col[r];
                }
            } else if(e.key === 'ArrowDown') {
                for(let c=0; c<4; c++) {
                    let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    let old = [...col];
                    col = operate(col.reverse()).reverse();
                    if(col.join(',') !== old.join(',')) moved = true;
                    for(let r=0; r<4; r++) board[r][c] = col[r];
                }
            }

            if(moved) {
                spawn();
                render();
                checkWinOrLose();
            }
        });

        init();
    </script>
</body>
</html>
