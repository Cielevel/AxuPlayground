<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxelForge - AI 体素模型生成器</title>
    <meta name="description" content="使用 AI 生成精美的 3D 体素模型。支持 Claude、OpenAI、GLM、DeepSeek 等多种 AI 模型。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ui-bg: rgba(255, 255, 255, 0.78);
            --ui-bg-strong: rgba(255, 255, 255, 0.92);
            --ui-glass: rgba(255, 255, 255, 0.6);
            --ui-border: rgba(15, 23, 42, 0.08);
            --ui-border-strong: rgba(15, 23, 42, 0.16);
            --ui-shadow: 0 30px 70px -35px rgba(15, 23, 42, 0.55);
            --ui-shadow-soft: 0 20px 50px -30px rgba(15, 23, 42, 0.4);
            --accent: #007aff;
            --accent-strong: #0057d8;
            --accent-glow: rgba(0, 122, 255, 0.2);
            --success: #16a34a;
            --warning: #f59e0b;
            --error: #ef4444;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --radius: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --transition: 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            --bg-card: var(--ui-bg);
            --bg-glass: var(--ui-glass);
            --border-color: var(--ui-border);
            --border-active: rgba(0, 122, 255, 0.45);
            --accent-primary: var(--accent);
            --accent-hover: var(--accent-strong);
            --accent-gradient: linear-gradient(135deg, #0a84ff 0%, #2d7cf7 100%);
            --shadow: var(--ui-shadow);
            --bg-tertiary: rgba(15, 23, 42, 0.12);
        }

        body {
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #eef2f6;
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-image:
                radial-gradient(1200px 600px at 15% -10%, rgba(255, 255, 255, 0.8), transparent 60%),
                radial-gradient(900px 500px at 85% 0%, rgba(99, 102, 241, 0.1), transparent 55%),
                linear-gradient(180deg, #f6f7fb 0%, #e9edf3 100%);
        }

        #canvas-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* ========== Top Bar ========== */
        .top-bar {
            position: fixed;
            top: 16px;
            left: 20px;
            right: 20px;
            z-index: 120;
            pointer-events: none;
        }

        .top-bar-inner {
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 16px;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--ui-shadow-soft);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #101827, #2c3447);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.2), 0 8px 20px rgba(15, 23, 42, 0.25);
        }

        .logo-text {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.3px;
        }

        .voxel-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(15, 23, 42, 0.04);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .voxel-badge .count {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .icon-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 12px;
            border: 1px solid var(--ui-border);
            border-radius: 12px;
            background: var(--ui-glass);
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-size: 16px;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.12);
        }

        .icon-btn:hover {
            border-color: var(--ui-border-strong);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .icon-btn.active {
            border-color: rgba(0, 122, 255, 0.4);
            color: var(--accent);
            background: rgba(0, 122, 255, 0.08);
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.18);
        }

        /* ========== Settings Panel ========== */
        .settings-panel {
            position: fixed;
            top: 88px;
            left: 20px;
            bottom: 20px;
            width: 360px;
            z-index: 200;
            background: var(--ui-bg-strong);
            border: 1px solid var(--ui-border);
            border-radius: var(--radius-xl);
            display: flex;
            flex-direction: column;
            box-shadow: var(--ui-shadow);
            transform: translateX(-420px);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .settings-panel.open {
            transform: translateX(0);
            opacity: 1;
        }

        .panel-header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--ui-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header h3 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .panel-close {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all var(--transition);
        }

        .panel-close:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-body::-webkit-scrollbar {
            width: 4px;
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: rgba(15, 23, 42, 0.18);
            border-radius: 4px;
        }

        /* Provider Tabs */
        .provider-tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(15, 23, 42, 0.06);
            border-radius: 12px;
        }

        .provider-tab {
            flex: 1;
            padding: 8px 4px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .provider-tab:hover {
            color: var(--text-secondary);
        }

        .provider-tab.active {
            background: #0f172a;
            color: #fff;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.2);
        }

        /* Form Groups */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: all var(--transition);
        }

        .form-input:focus,
        .form-select:focus {
            border-color: rgba(0, 122, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-select {
            cursor: pointer;
            appearance: none;
        }

        .form-select option {
            background: #fff;
            color: var(--text-primary);
        }

        /* Custom Range Slider */
        .form-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(15, 23, 42, 0.08);
            border-radius: 4px;
            outline: none;
            transition: all var(--transition);
        }

        .form-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 0 6px rgba(0, 122, 255, 0.15);
            transition: transform var(--transition);
        }

        .form-slider::-webkit-slider-thumb:hover {
            transform: scale(1.05);
        }

        .input-wrapper {
            position: relative;
        }

        /* Drag and Drop Overlay */
        .drop-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .drop-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drop-message {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            padding: 36px;
            border: 1px dashed rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.4);
        }

        .input-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: rgba(0, 122, 255, 0.12);
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all var(--transition);
        }

        .input-toggle:hover {
            background: rgba(0, 122, 255, 0.2);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.ok {
            background: var(--success);
            box-shadow: 0 0 8px rgba(22, 163, 74, 0.35);
        }

        .status-dot.empty {
            background: var(--text-muted);
        }

        .key-status {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        /* ========== Bottom Prompt Bar ========== */
        .bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 110;
            width: min(720px, calc(100% - 40px));
        }

        .prompt-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding: 12px 14px;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            border-radius: 20px;
            box-shadow: var(--ui-shadow-soft);
            transition: all var(--transition);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .prompt-container:focus-within {
            border-color: rgba(0, 122, 255, 0.4);
            box-shadow: 0 30px 60px -30px rgba(0, 122, 255, 0.35);
            transform: translateY(-1px);
        }

        .prompt-input {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
        }

        .prompt-input::placeholder {
            color: var(--text-muted);
        }

        .generate-btn {
            flex-shrink: 0;
            padding: 12px 22px;
            background: linear-gradient(135deg, #0a84ff, #2d7cf7);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 12px 26px rgba(0, 122, 255, 0.3);
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(0, 122, 255, 0.35);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
            background: rgba(15, 23, 42, 0.2);
            color: rgba(15, 23, 42, 0.4);
        }

        .provider-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-right: 1px solid var(--ui-border);
            white-space: nowrap;
            cursor: pointer;
            transition: color var(--transition);
            flex-shrink: 0;
        }

        .provider-indicator:hover {
            color: var(--accent);
        }

        /* ========== Loading Indicator (non-blocking) ========== */
        .generating-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.75);
            color: #fff;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.4);
        }

        .generating-indicator.active {
            display: flex;
        }

        .generating-indicator .mini-spinner {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        .generating-indicator .gen-text {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes floating {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }

        .prompt-container.disabled .prompt-input {
            pointer-events: none;
            opacity: 0.4;
        }

        .prompt-container.disabled .generate-btn {
            pointer-events: none;
        }

        /* ========== Console Panel ========== */
        .console-panel {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 420px;
            max-height: 50vh;
            min-height: 120px;
            z-index: 150;
            background: var(--ui-bg-strong);
            border: 1px solid var(--ui-border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            box-shadow: var(--ui-shadow);
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .console-panel.open {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--ui-border);
            flex-shrink: 0;
        }

        .console-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .console-header h4 {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .console-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .console-dot.live {
            background: var(--success);
            box-shadow: 0 0 6px rgba(22, 163, 74, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .console-actions {
            display: flex;
            gap: 4px;
        }

        .console-action-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all var(--transition);
        }

        .console-action-btn:hover {
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.06);
        }

        .console-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .console-body::-webkit-scrollbar {
            width: 4px;
        }

        .console-body::-webkit-scrollbar-thumb {
            background: rgba(15, 23, 42, 0.2);
            border-radius: 4px;
        }

        .log-line {
            padding: 1px 0;
            word-break: break-all;
        }

        .log-line .log-time {
            color: var(--text-muted);
            margin-right: 8px;
            font-size: 10px;
        }

        .log-line.info {
            color: #2563eb;
        }

        .log-line.success {
            color: #16a34a;
        }

        .log-line.error {
            color: #dc2626;
        }

        .log-line.warn {
            color: #d97706;
        }

        .log-line.data {
            color: #4f46e5;
            font-size: 10px;
        }

        /* ========== API Test Button ========== */
        .test-btn {
            padding: 8px 14px;
            border: 1px solid rgba(22, 163, 74, 0.3);
            border-radius: 12px;
            background: rgba(22, 163, 74, 0.08);
            color: #15803d;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .test-btn:hover {
            background: rgba(22, 163, 74, 0.16);
            border-color: rgba(22, 163, 74, 0.45);
        }

        .test-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .test-result {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 0;
            min-height: 20px;
        }

        .test-result.ok {
            color: #15803d;
        }

        .test-result.fail {
            color: #dc2626;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        @media (max-width: 900px) {
            .top-bar {
                left: 12px;
                right: 12px;
            }

            .settings-panel {
                width: calc(100% - 24px);
                left: 12px;
                right: 12px;
            }
        }

        @media (max-width: 768px) {
            .console-panel {
                width: calc(100% - 24px);
                left: 12px;
                right: 12px;
            }

            .bottom-bar {
                width: calc(100% - 24px);
            }
        }

        /* ========== JSON Modal ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 600;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(6px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: var(--ui-bg-strong);
            border: 1px solid var(--ui-border);
            border-radius: var(--radius-xl);
            width: min(640px, calc(100% - 40px));
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--ui-shadow);
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--ui-border);
        }

        .modal-header h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .modal-body {
            padding: 16px 20px;
            flex: 1;
            overflow-y: auto;
        }

        .modal-body textarea {
            width: 100%;
            min-height: 300px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            outline: none;
            resize: vertical;
        }

        .modal-body textarea:focus {
            border-color: rgba(0, 122, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--ui-border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 8px 18px;
            border: 1px solid var(--ui-border);
            border-radius: 12px;
            background: transparent;

    <script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
}
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        // ======================== VOXEL ENGINE ========================
        class VoxelEngine {
            constructor(container) {
                this.container = container;
                this.voxels = [];      // { x, y, z, color: THREE.Color }
                this.instanceMesh = null;
                this.dummy = new THREE.Object3D();

                const VOXEL_SIZE = 1;
                const FLOOR_Y = -12;
                const BG_COLOR = 0x0f0f17;

                this.VOXEL_SIZE = VOXEL_SIZE;
                this.FLOOR_Y = FLOOR_Y;

                // Scene
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(BG_COLOR);
                this.scene.fog = new THREE.Fog(BG_COLOR, 80, 180);

                // Camera
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(30, 30, 60);

                // Renderer
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                container.appendChild(this.renderer.domElement);

                // Controls
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.autoRotate = true;
                this.controls.autoRotateSpeed = 0.5;
                this.controls.target.set(0, 5, 0);

                // Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
                dirLight.position.set(50, 80, 30);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                dirLight.shadow.camera.left = -40;
                dirLight.shadow.camera.right = 40;
                dirLight.shadow.camera.top = 40;
                dirLight.shadow.camera.bottom = -40;
                this.scene.add(dirLight);

                const rimLight = new THREE.DirectionalLight(0x6366f1, 0.4);
                rimLight.position.set(-30, 20, -40);
                this.scene.add(rimLight);

                // Floor
                const floorMat = new THREE.MeshStandardMaterial({
                    color: 0x1a1a2e,
                    roughness: 0.9,
                    metalness: 0.1
                });
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = FLOOR_Y;
                floor.receiveShadow = true;
                this.scene.add(floor);

                // Grid helper
                const gridHelper = new THREE.GridHelper(80, 40, 0x2a2a4a, 0x1a1a3e);
                gridHelper.position.y = FLOOR_Y + 0.01;
                this.scene.add(gridHelper);

                // Animation loop
                this.animate = this.animate.bind(this);
                this.animate();
            }

            loadModel(data) {
                // Clear existing
                if (this.instanceMesh) {
                    this.scene.remove(this.instanceMesh);
                    this.instanceMesh.geometry.dispose();
                    if (Array.isArray(this.instanceMesh.material)) {
                        this.instanceMesh.material.forEach(m => m.dispose());
                    } else {
                        this.instanceMesh.material.dispose();
                    }
                    this.instanceMesh = null;
                }

                if (!data || data.length === 0) {
                    this.voxels = [];
                    return;
                }

                this.voxels = data.map((v, i) => {
                    const c = new THREE.Color(v.color);
                    c.offsetHSL(0, 0, (Math.random() * 0.08) - 0.04);
                    return { x: v.x, y: v.y, z: v.z, color: c };
                });

                const geo = new THREE.BoxGeometry(
                    this.VOXEL_SIZE - 0.05,
                    this.VOXEL_SIZE - 0.05,
                    this.VOXEL_SIZE - 0.05
                );
                const mat = new THREE.MeshStandardMaterial({ roughness: 0.7, metalness: 0.15 });
                this.instanceMesh = new THREE.InstancedMesh(geo, mat, this.voxels.length);
                this.instanceMesh.castShadow = true;
                this.instanceMesh.receiveShadow = true;
                this.scene.add(this.instanceMesh);

                this.draw();
            }

            draw() {
                if (!this.instanceMesh) return;
                this.voxels.forEach((v, i) => {
                    this.dummy.position.set(v.x, v.y, v.z);
                    this.dummy.rotation.set(0, 0, 0);
                    this.dummy.updateMatrix();
                    this.instanceMesh.setMatrixAt(i, this.dummy.matrix);
                    this.instanceMesh.setColorAt(i, v.color);
                });
                this.instanceMesh.instanceMatrix.needsUpdate = true;
                if (this.instanceMesh.instanceColor) {
                    this.instanceMesh.instanceColor.needsUpdate = true;
                }
            }

            animate() {
                requestAnimationFrame(this.animate);
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }

            handleResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            setAutoRotate(enabled) {
                this.controls.autoRotate = enabled;
            }

            getAutoRotate() {
                return this.controls.autoRotate;
            }

            getJsonData() {
                return this.voxels.map((v, i) => ({
                    x: +v.x.toFixed(2),
                    y: +v.y.toFixed(2),
                    z: +v.z.toFixed(2),
                    color: '#' + v.color.getHexString()
                }));
            }

            getVoxelCount() {
                return this.voxels.length;
            }

            clear() {
                this.loadModel([]);
            }
        }

        // ======================== VOX FILE BUILDER ========================
        function buildVoxFile(voxelData) {
            // MagicaVoxel .vox format v150
            // Coordinate mapping: Three.js (X-right, Y-up, Z-forward) → VOX (X-right, Y-forward, Z-up)
            // vox_x = our_x, vox_y = our_z, vox_z = our_y

            if (!voxelData || voxelData.length === 0) throw new Error('No voxel data to export');

            // 1. Normalize coordinates to 0-255 range and remap axes
            let minX = Infinity, minY = Infinity, minZ = Infinity;
            let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;

            const mapped = voxelData.map(v => {
                // Remap: vox_x = our_x, vox_y = our_z, vox_z = our_y
                const vx = Math.round(v.x);
                const vy = Math.round(v.z);
                const vz = Math.round(v.y);
                minX = Math.min(minX, vx); maxX = Math.max(maxX, vx);
                minY = Math.min(minY, vy); maxY = Math.max(maxY, vy);
                minZ = Math.min(minZ, vz); maxZ = Math.max(maxZ, vz);
                return { vx, vy, vz, color: v.color };
            });

            // Shift so all coords are >= 0
            const offsetX = -minX;
            const offsetY = -minY;
            const offsetZ = -minZ;

            const sizeX = maxX - minX + 1;
            const sizeY = maxY - minY + 1;
            const sizeZ = maxZ - minZ + 1;

            // Clamp to 256 (MagicaVoxel max)
            if (sizeX > 256 || sizeY > 256 || sizeZ > 256) {
                logToConsole(`⚠️ 模型尺寸 ${sizeX}x${sizeY}x${sizeZ} 超过 MagicaVoxel 限制(256)，将被裁剪`, 'warn');
            }

            // 2. Build color palette (max 255 colors, index 1-255)
            const colorMap = new Map(); // hex string → palette index (1-based)
            const palette = []; // array of {r,g,b,a}

            // Collect unique colors
            for (const v of mapped) {
                let c = v.color;
                let hex;
                if (typeof c === 'number') {
                    hex = c.toString(16).padStart(6, '0');
                } else if (typeof c === 'string') {
                    hex = c.replace('#', '');
                } else if (c && typeof c.getHexString === 'function') {
                    hex = c.getHexString();
                } else {
                    hex = 'cccccc';
                }
                hex = hex.toLowerCase();
                if (!colorMap.has(hex)) {
                    if (palette.length >= 255) continue; // palette full
                    palette.push({
                        r: parseInt(hex.substring(0, 2), 16),
                        g: parseInt(hex.substring(2, 4), 16),
                        b: parseInt(hex.substring(4, 6), 16),
                        a: 255
                    });
                    colorMap.set(hex, palette.length); // 1-based index
                }
            }

            // 3. Build voxel list with palette indices, dedup and clamp
            const voxelSet = new Set();
            const voxels = [];
            for (const v of mapped) {
                const x = v.vx + offsetX;
                const y = v.vy + offsetY;
                const z = v.vz + offsetZ;
                if (x < 0 || x > 255 || y < 0 || y > 255 || z < 0 || z > 255) continue;

                const key = `${x},${y},${z}`;
                if (voxelSet.has(key)) continue;
                voxelSet.add(key);

                let hex;
                const c = v.color;
                if (typeof c === 'number') hex = c.toString(16).padStart(6, '0');
                else if (typeof c === 'string') hex = c.replace('#', '');
                else if (c && typeof c.getHexString === 'function') hex = c.getHexString();
                else hex = 'cccccc';
                hex = hex.toLowerCase();

                const colorIdx = colorMap.get(hex) || 1;
                voxels.push({ x, y, z, i: colorIdx });
            }

            // 4. Build binary chunks
            function writeInt32(view, offset, val) {
                view.setInt32(offset, val, true); // little-endian
                return offset + 4;
            }

            // SIZE chunk: 12 bytes content (3 × int32)
            const sizeContent = 12;
            const sizeChunkSize = 4 + 4 + 4 + sizeContent; // id + contentSize + childrenSize + content

            // XYZI chunk: 4 + numVoxels*4 bytes content
            const xyziContent = 4 + voxels.length * 4;
            const xyziChunkSize = 4 + 4 + 4 + xyziContent;

            // RGBA chunk: 256 * 4 bytes content
            const rgbaContent = 256 * 4;
            const rgbaChunkSize = 4 + 4 + 4 + rgbaContent;

            // MAIN chunk
            const mainChildrenSize = sizeChunkSize + xyziChunkSize + rgbaChunkSize;
            const mainChunkSize = 4 + 4 + 4 + mainChildrenSize; // id + contentSize + childrenSize + children

            // Total file: magic(4) + version(4) + mainChunk
            const totalSize = 4 + 4 + mainChunkSize;
            const buffer = new ArrayBuffer(totalSize);
            const view = new DataView(buffer);
            const bytes = new Uint8Array(buffer);
            let pos = 0;

            // Magic: "VOX "
            bytes[pos++] = 0x56; bytes[pos++] = 0x4F; bytes[pos++] = 0x58; bytes[pos++] = 0x20;
            // Version: 150
            pos = writeInt32(view, pos, 150);

            // MAIN chunk header
            bytes[pos++] = 0x4D; bytes[pos++] = 0x41; bytes[pos++] = 0x49; bytes[pos++] = 0x4E; // "MAIN"
            pos = writeInt32(view, pos, 0); // content size = 0
            pos = writeInt32(view, pos, mainChildrenSize);

            // SIZE chunk
            bytes[pos++] = 0x53; bytes[pos++] = 0x49; bytes[pos++] = 0x5A; bytes[pos++] = 0x45; // "SIZE"
            pos = writeInt32(view, pos, sizeContent);
            pos = writeInt32(view, pos, 0); // children size
            pos = writeInt32(view, pos, Math.min(sizeX, 256));
            pos = writeInt32(view, pos, Math.min(sizeY, 256));
            pos = writeInt32(view, pos, Math.min(sizeZ, 256));

            // XYZI chunk
            bytes[pos++] = 0x58; bytes[pos++] = 0x59; bytes[pos++] = 0x5A; bytes[pos++] = 0x49; // "XYZI"
            pos = writeInt32(view, pos, xyziContent);
            pos = writeInt32(view, pos, 0); // children size
            pos = writeInt32(view, pos, voxels.length);
            for (const v of voxels) {
                bytes[pos++] = v.x & 0xFF;
                bytes[pos++] = v.y & 0xFF;
                bytes[pos++] = v.z & 0xFF;
                bytes[pos++] = v.i & 0xFF;
            }

            // RGBA chunk (palette)
            bytes[pos++] = 0x52; bytes[pos++] = 0x47; bytes[pos++] = 0x42; bytes[pos++] = 0x41; // "RGBA"
            pos = writeInt32(view, pos, rgbaContent);
            pos = writeInt32(view, pos, 0); // children size
            // Index 0 is unused in the file, palette entries 1-255 map to file positions 0-254
            for (let i = 0; i < 256; i++) {
                if (i < palette.length) {
                    bytes[pos++] = palette[i].r;
                    bytes[pos++] = palette[i].g;
                    bytes[pos++] = palette[i].b;
                    bytes[pos++] = palette[i].a;
                } else {
                    bytes[pos++] = 0; bytes[pos++] = 0; bytes[pos++] = 0; bytes[pos++] = 255;
                }
            }

            return buffer;
        }

        // ======================== AI API LAYER ========================
        const PROVIDERS = {
            openai: {
                name: 'OpenAI',

                buildRequest(stage, apiKey, model, prompt, extraData, baseUrl, complexity, maxSize) {
                    const url = `${baseUrl || this.defaultBaseUrl}/v1/chat/completions`;
                    const sysPrompt = stage === 1 ? buildShapeSystemPrompt(complexity, maxSize) : buildColorSystemPrompt(complexity, maxSize);
                    const userPrompt = stage === 1 ? buildShapeUserPrompt(prompt) : buildColorUserPrompt(prompt, extraData);
                    return {

                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: {

                                { role: 'user', content: userPrompt }
                            ],
                            temperature: 0.7,
                            response_format: { type: 'json_object' }
                        }
                    };
                },
                parseResponse(data) {

                    return extractJsonObject(text);

                    const userPrompt = stage === 1 ? buildShapeUserPrompt(prompt) : buildColorUserPrompt(prompt, extraData);
                    return {

                buildRequest(stage, apiKey, model, prompt, extraData, baseUrl, complexity, maxSize) {

                    const sysPrompt = stage === 1 ? buildShapeSystemPrompt(complexity, maxSize) : buildColorSystemPrompt(complexity, maxSize);
                    const userPrompt = stage === 1 ? buildShapeUserPrompt(prompt) : buildColorUserPrompt(prompt, extraData);
                    return {

                    };

                parseResponse(data) {
                    const msg = data.choices?.[0]?.message || {};
                    const text = msg.content || msg.reasoning_content || msg.output_text || '';
                    return extractJsonObject(text);

            gemini: {
                name: 'Gemini',
                defaultBaseUrl: 'https://generativelanguage.googleapis.com',
                buildRequest(stage, apiKey, model, prompt, extraData, baseUrl, complexity, maxSize) {
                    let urlBase = baseUrl || this.defaultBaseUrl;
                    if (urlBase.endsWith('/')) urlBase = urlBase.slice(0, -1);
                    const url = `${urlBase}/v1beta/models/${model}:generateContent?key=${apiKey}`;
                    const sysPrompt = stage === 1 ? buildShapeSystemPrompt(complexity, maxSize) : buildColorSystemPrompt(complexity, maxSize);
                    const userPrompt = stage === 1 ? buildShapeUserPrompt(prompt) : buildColorUserPrompt(prompt, extraData);

        function buildShapeSystemPrompt(complexity = 300, maxSize = 32) {
            const minVoxels = Math.max(10, Math.floor(complexity * 0.8));
            const maxVoxels = Math.floor(complexity * 1.2);
            return `You are a 3D voxel shape generator. Your output must be ONLY a valid JSON object.
Rules:
- Generate an array of 3D integer coordinates representing the shape blocks.
- Keep the voxel count between ${minVoxels} and ${maxVoxels}. Target: ${complexity} voxels.
- Coordinates must fit within a box: -${maxSize} to ${maxSize}.
- Center the model around x=0, z=0. The bottom starts at y=0.
- Output MUST be a JSON object with a key "voxels", containing an array of coordinates [x, y, z].
Example: {"voxels": [[0,0,0], [1,0,0], [0,1,0]]}`;
        }

        function buildShapeUserPrompt(prompt) {
            return `Generate the voxel shape coordinates for: "${prompt}". Return ONLY the JSON object.`;
        }

        function buildColorSystemPrompt(complexity = 300, maxSize = 32) {
            return `You are a 3D voxel coloring AI. Your output must be ONLY a valid JSON object.
Rules:
- You will receive a prompt and a list of voxel coordinates.
- You must generate a hex color for each coordinate to paint the model.
- Return a JSON object with a "colors" key.
- The value must be an object mapping the coordinate string "[x,y,z]" to a hex color "#RRGGBB".
Example: {"colors": {"[0,0,0]": "#FF0000", "[1,0,0]": "#00FF00"}}`;
        }

        function buildColorUserPrompt(prompt, extraData) {
            return `Color the voxel model for: "${prompt}".
Coordinates:
${JSON.stringify(extraData)}
Return ONLY the JSON object mapping coordinates to colors.`;
        }

        function extractJsonObject(text) {
            let cleaned = text.trim();
            cleaned = cleaned.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();
            const startIdx = cleaned.indexOf('{');
            if (startIdx === -1) throw new Error('No JSON object found in response');
            cleaned = cleaned.substring(startIdx);
            try { return JSON.parse(cleaned); } catch (e) {
                const endIdx = cleaned.lastIndexOf('}');
                if (endIdx > 0) {
                    try { return JSON.parse(cleaned.substring(0, endIdx + 1)); } catch (e2) {}
                }
            }
            throw new Error('无法解析阶段 JSON');
        }

        function extractJsonArray(text) {
            let cleaned = text.trim();
            cleaned = cleaned.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();
            const startIdx = cleaned.indexOf('[');
            if (startIdx === -1) throw new Error('No JSON array found in response');
            cleaned = cleaned.substring(startIdx);
            try { return JSON.parse(cleaned); } catch (e) {
                const endIdx = cleaned.lastIndexOf(']');
                if (endIdx > 0) {
                    try { return JSON.parse(cleaned.substring(0, endIdx + 1)); } catch (e2) {}
                }
            }
            throw new Error('无法解析 JSON 数组');
        }

        function parseVoxelData(rawArray) {
            return rawArray.map(v => {
                let colorVal = v.color || v.c || '#CCCCCC';
                let colorInt = 0xCCCCCC;
                if (typeof colorVal === 'string') {
                    if (colorVal.startsWith('#')) colorVal = colorVal.substring(1);
                    colorInt = parseInt(colorVal, 16);
                } else if (typeof colorVal === 'number') {
                    colorInt = colorVal;
                }
                return {
                    x: Math.round(Number(v.x) || 0),
                    y: Math.round(Number(v.y) || 0),
                    z: Math.round(Number(v.z) || 0),
                    color: isNaN(colorInt) ? 0xCCCCCC : colorInt
                };
            });
        }

        // ======================== API TEST ========================
        window.testApi = async function (provider) {

            logToConsole(`[测试] 端点: ${config.baseUrl || PROVIDERS[provider].defaultBaseUrl}`, 'data');
            logToConsole(`[测试] 模型: ${config.model}`, 'data');

            const startTime = Date.now();

            try {
                const prov = PROVIDERS[provider];
                const req = prov.buildRequest(1, config.key, config.model, 'Say "hello" in one word.', null, config.baseUrl, 50, 32);
                // Overwrite body to be minimal for test
                if (provider === 'claude') {
                    req.body.messages = [

                } else {

                    delete req.body.response_format;
                }

                const resp = await fetch(req.url, {
                    method: 'POST',
                    headers: req.headers,
                    body: JSON.stringify(req.body)
                });

                const elapsed = Date.now() - startTime;

                if (resp.ok) {
                    const data = await resp.json();
                    let replyText = '';
                    if (provider === 'claude') {
                        replyText = data.content?.[0]?.text || '';
                    } else if (provider === 'gemini') {
                        replyText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    } else {
                        replyText = data.choices?.[0]?.message?.content || '';
                    }
                    resultEl.className = 'test-result ok';
                    resultEl.textContent = `✅ 连通成功 (${elapsed}ms)`;
                    logToConsole(`[测试] ✅ ${PROVIDERS[provider].name} 连通成功，耗时 ${elapsed}ms`, 'success');
                    logToConsole(`[测试] 回复: ${replyText.substring(0, 100)}`, 'data');
                } else {
                    const errText = await resp.text();
                    let errMsg = `HTTP ${resp.status}`;
                    try {
                        const errJson = JSON.parse(errText);
                        errMsg = errJson.error?.message || errJson.message || errMsg;
                    } catch { }
                    resultEl.className = 'test-result fail';
                    resultEl.textContent = `❌ 失败: ${errMsg.substring(0, 60)}`;
                    logToConsole(`[测试] ❌ ${PROVIDERS[provider].name} 连通失败: ${errMsg}`, 'error');
                }
            } catch (err) {
                const elapsed = Date.now() - startTime;
                resultEl.className = 'test-result fail';
                resultEl.textContent = `❌ 网络错误: ${err.message.substring(0, 50)}`;
                logToConsole(`[测试] ❌ ${PROVIDERS[provider].name} 网络错误 (${elapsed}ms): ${err.message}`, 'error');
            }
        };

        window.downloadObj = async function () {
            const data = engine.getJsonData();
            if (data.length === 0) {
                showToast('场景为空，无法导出', 'error');
                return;
            }

            try {
                showToast('正在生成 OBJ 和贴图文件...', 'info');

                // 1. Extract unique colors to build a palette
                const uniqueColors = [];
                const colorMap = new Map(); // hex -> palette index (0-based)

                data.forEach(v => {
                    let hex = v.color.replace('#', '').toLowerCase();
                    if (!colorMap.has(hex)) {
                        colorMap.set(hex, uniqueColors.length);
                        uniqueColors.push(hex);
                    }
                });

                const paletteWidth = Math.max(1, uniqueColors.length);
                const paletteHeight = 1;

                // 2. Build texture PNG via canvas
                const canvas = document.createElement('canvas');
                canvas.width = paletteWidth;
                canvas.height = paletteHeight;
                const ctx = canvas.getContext('2d');

                for (let i = 0; i < uniqueColors.length; i++) {
                    ctx.fillStyle = '#' + uniqueColors[i];
                    ctx.fillRect(i, 0, 1, 1);
                }

                const pngBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));

                // 3. Build .mtl content
                let mtlText = "# VoxelForge MTL\n";
                mtlText += "newmtl palette\n";
                mtlText += "Ka 1.000000 1.000000 1.000000\n";
                mtlText += "Kd 1.000000 1.000000 1.000000\n";
                mtlText += "Ks 0.000000 0.000000 0.000000\n";
                mtlText += "map_Kd voxel_model.png\n";

                // 4. Build .obj content
                let objText = "# VoxelForge OBJ Export\n";
                objText += "mtllib voxel_model.mtl\n";
                objText += "usemtl palette\n";

                // Write Texture Coordinates (vt)
                // We map each voxel's color index to the center of its pixel in the palette texture
                for (let i = 0; i < uniqueColors.length; i++) {
                    const u = (i + 0.5) / paletteWidth;
                    objText += `vt ${u.toFixed(6)} 0.5\n`;
                }

                let vOffset = 0;

                data.forEach(v => {
                    // Try mapping colors
                    let hex = v.color.replace('#', '').toLowerCase();
                    const cIdx = (colorMap.get(hex) || 0) + 1; // 1-based index for OBJ

                    const x = v.x, y = v.y, z = v.z;
                    const h = 0.5;

                    // 8 vertices (without vertex colors, since standard OBJ parsers might fail with them)
                    objText += `v ${x - h} ${y - h} ${z + h}\n`;
                    objText += `v ${x + h} ${y - h} ${z + h}\n`;
                    objText += `v ${x - h} ${y + h} ${z + h}\n`;
                    objText += `v ${x + h} ${y + h} ${z + h}\n`;
                    objText += `v ${x - h} ${y - h} ${z - h}\n`;
                    objText += `v ${x + h} ${y - h} ${z - h}\n`;
                    objText += `v ${x - h} ${y + h} ${z - h}\n`;
                    objText += `v ${x + h} ${y + h} ${z - h}\n`;

                    // 6 faces (f v/vt)
                    const o = vOffset;
                    objText += `f ${o + 1}/${cIdx} ${o + 2}/${cIdx} ${o + 4}/${cIdx} ${o + 3}/${cIdx}\n`; // Front
                    objText += `f ${o + 3}/${cIdx} ${o + 4}/${cIdx} ${o + 8}/${cIdx} ${o + 7}/${cIdx}\n`; // Top
                    objText += `f ${o + 7}/${cIdx} ${o + 8}/${cIdx} ${o + 6}/${cIdx} ${o + 5}/${cIdx}\n`; // Back
                    objText += `f ${o + 5}/${cIdx} ${o + 6}/${cIdx} ${o + 2}/${cIdx} ${o + 1}/${cIdx}\n`; // Bottom
                    objText += `f ${o + 1}/${cIdx} ${o + 3}/${cIdx} ${o + 7}/${cIdx} ${o + 5}/${cIdx}\n`; // Left
                    objText += `f ${o + 6}/${cIdx} ${o + 8}/${cIdx} ${o + 4}/${cIdx} ${o + 2}/${cIdx}\n`; // Right

                    vOffset += 8;
                });

                // 5. Package as ZIP using JSZip
                if (typeof JSZip === 'undefined') {
                    throw new Error("JSZip library not loaded");
                }
                const zip = new JSZip();
                zip.file("voxel_model.obj", objText);
                zip.file("voxel_model.mtl", mtlText);
                zip.file("voxel_model.png", pngBlob);

                const zipBlob = await zip.generateAsync({ type: "blob" });

                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'voxel_model.zip';
                a.click();
                URL.revokeObjectURL(url);

                showToast('已下载 voxel_model.zip', 'success');
                logToConsole(`导出 OBJ ZIP: 包含 ${data.length} 个体素`, 'success');

            } catch (err) {
                showToast('OBJ导出失败: ' + err.message, 'error');
                logToConsole('OBJ导出出错: ' + err.message, 'error');
            }
        };

        window.downloadOptimizedObj = async function () {
            const data = engine.getJsonData();
            if (data.length === 0) {
                showToast('场景为空，无法导出', 'error');
                return;
            }

            try {
                showToast('正在精简生成 OBJ (表面剔除)...', 'info');

                // 1. Build spatial map of voxels for neighbor checking
                const voxelMap = new Map();
                data.forEach(v => {
                    const key = `${v.x},${v.y},${v.z}`;
                    voxelMap.set(key, v);
                });

                // Helper to check if a neighbor exists
                const hasNeighbor = (x, y, z) => voxelMap.has(`${x},${y},${z}`);

                // 2. Extract unique colors to build a palette
                const uniqueColors = [];
                const colorMap = new Map(); // hex -> palette index (0-based)

                data.forEach(v => {
                    let hex = v.color.replace('#', '').toLowerCase();
                    if (!colorMap.has(hex)) {
                        colorMap.set(hex, uniqueColors.length);
                        uniqueColors.push(hex);
                    }
                });

                const paletteWidth = Math.max(1, uniqueColors.length);
                const paletteHeight = 1;

                // 3. Build texture PNG via canvas
                const canvas = document.createElement('canvas');
                canvas.width = paletteWidth;
                canvas.height = paletteHeight;
                const ctx = canvas.getContext('2d');

                for (let i = 0; i < uniqueColors.length; i++) {
                    ctx.fillStyle = '#' + uniqueColors[i];
                    ctx.fillRect(i, 0, 1, 1);
                }

                const pngBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));

                // 4. Build .mtl content
                let mtlText = "# VoxelForge MTL (Optimized)\n";
                mtlText += "newmtl palette\n";
                mtlText += "Ka 1.000000 1.000000 1.000000\n";
                mtlText += "Kd 1.000000 1.000000 1.000000\n";
                mtlText += "Ks 0.000000 0.000000 0.000000\n";
                mtlText += "map_Kd voxel_model_opt.png\n";

                // 5. Build .obj content
                let objText = "# VoxelForge OBJ Export (Optimized Surface)\n";
                objText += "mtllib voxel_model_opt.mtl\n";
                objText += "usemtl palette\n";

                // Write Texture Coordinates (vt)
                for (let i = 0; i < uniqueColors.length; i++) {
                    const u = (i + 0.5) / paletteWidth;
                    objText += `vt ${u.toFixed(6)} 0.5\n`;
                }

                let vOffset = 0;
                let culledFaces = 0;
                let totalExpectedFaces = data.length * 6;

                data.forEach(v => {
                    const x = v.x, y = v.y, z = v.z;

                    // Check neighbors (Right, Left, Top, Bottom, Front, Back)
                    // Note coordinates check in VoxelForge layout
                    const right = hasNeighbor(x + 1, y, z);
                    const left = hasNeighbor(x - 1, y, z);
                    const top = hasNeighbor(x, y + 1, z);
                    const bottom = hasNeighbor(x, y - 1, z);
                    const front = hasNeighbor(x, y, z + 1);
                    const back = hasNeighbor(x, y, z - 1);

                    // If completely surrounded, cull all faces for this voxel, don't even emit vertices
                    if (right && left && top && bottom && front && back) {
                        culledFaces += 6;
                        return;
                    }

                    // Otherwise emit vertices and only exposed faces
                    let hex = v.color.replace('#', '').toLowerCase();
                    const cIdx = (colorMap.get(hex) || 0) + 1;

                    const h = 0.5;

                    // 8 vertices 
                    objText += `v ${x - h} ${y - h} ${z + h}\n`;
                    objText += `v ${x + h} ${y - h} ${z + h}\n`;
                    objText += `v ${x - h} ${y + h} ${z + h}\n`;
                    objText += `v ${x + h} ${y + h} ${z + h}\n`;
                    objText += `v ${x - h} ${y - h} ${z - h}\n`;
                    objText += `v ${x + h} ${y - h} ${z - h}\n`;
                    objText += `v ${x - h} ${y + h} ${z - h}\n`;
                    objText += `v ${x + h} ${y + h} ${z - h}\n`;

                    const o = vOffset;

                    // Front (z + 1)
                    if (!front) objText += `f ${o + 1}/${cIdx} ${o + 2}/${cIdx} ${o + 4}/${cIdx} ${o + 3}/${cIdx}\n`; else culledFaces++;
                    // Top (y + 1)
                    if (!top) objText += `f ${o + 3}/${cIdx} ${o + 4}/${cIdx} ${o + 8}/${cIdx} ${o + 7}/${cIdx}\n`; else culledFaces++;
                    // Back (z - 1)
                    if (!back) objText += `f ${o + 7}/${cIdx} ${o + 8}/${cIdx} ${o + 6}/${cIdx} ${o + 5}/${cIdx}\n`; else culledFaces++;
                    // Bottom (y - 1)
                    if (!bottom) objText += `f ${o + 5}/${cIdx} ${o + 6}/${cIdx} ${o + 2}/${cIdx} ${o + 1}/${cIdx}\n`; else culledFaces++;
                    // Left (x - 1)
                    if (!left) objText += `f ${o + 1}/${cIdx} ${o + 3}/${cIdx} ${o + 7}/${cIdx} ${o + 5}/${cIdx}\n`; else culledFaces++;
                    // Right (x + 1)
                    if (!right) objText += `f ${o + 6}/${cIdx} ${o + 8}/${cIdx} ${o + 4}/${cIdx} ${o + 2}/${cIdx}\n`; else culledFaces++;

                    vOffset += 8;
                });

                // 6. Package as ZIP using JSZip
                if (typeof JSZip === 'undefined') {
                    throw new Error("JSZip library not loaded");
                }
                const zip = new JSZip();
                zip.file("voxel_model_opt.obj", objText);
                zip.file("voxel_model_opt.mtl", mtlText);
                zip.file("voxel_model_opt.png", pngBlob);

                const zipBlob = await zip.generateAsync({ type: "blob" });

                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'voxel_model_opt.zip';
                a.click();
                URL.revokeObjectURL(url);

                const cullingPercent = ((culledFaces / totalExpectedFaces) * 100).toFixed(1);
                showToast(`已下载精简 obj, 剔除不可见内部面 ${culledFaces} 个 (${cullingPercent}%)`, 'success');
                logToConsole(`导出精简 OBJ ZIP: 剔除 ${culledFaces}/${totalExpectedFaces} 面 (${cullingPercent}%)`, 'success');

            } catch (err) {
                showToast('精简 OBJ 导出失败: ' + err.message, 'error');
                logToConsole('精简 OBJ 导出出错: ' + err.message, 'error');
            }
        };

        function setupDragAndDrop() {
            const dropOverlay = document.getElementById('drop-overlay');
            const fileImportInput = document.getElementById('file-import-input');
            let dragCounter = 0;

            fileImportInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleFileImport(file);
                e.target.value = ''; // Reset
            });

            document.body.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragCounter++;
                dropOverlay.classList.add('active');
            });

            document.body.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragCounter--;
                if (dragCounter === 0) {
                    dropOverlay.classList.remove('active');
                }
            });

            document.body.addEventListener('dragover', (e) => {
                e.preventDefault(); // Necessary to allow drop
            });

            document.body.addEventListener('drop', (e) => {
                e.preventDefault(); // Prevent default browser behavior (open file map)
                dragCounter = 0;
                dropOverlay.classList.remove('active');

                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    handleFileImport(file);
                }
            });

            // Also close drop overlay if drop happens on it
            dropOverlay.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounter = 0;
                dropOverlay.classList.remove('active');

                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    handleFileImport(file);
                }
            });
        }

        async function generate() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt || isGenerating) return;

            const config = getProviderConfig(activeProvider);
            if (!config.key) {
                showToast('请先配置 API Key（点击左上角 ⚙️）', 'error');
                toggleSettings();
                return;
            }

            isGenerating = true;
            document.getElementById('btn-generate').disabled = true;
            setGeneratingUI(true, `${PROVIDERS[activeProvider].name} 正在生成第一阶段(白模)...`);
            setConsoleLive(true);

            if (!document.getElementById('console-panel').classList.contains('open')) {
                toggleConsole();
            }

            logToConsole(`━━━ 新生成任务(分步生成) ━━━`, 'info');
            logToConsole(`提供商: ${PROVIDERS[activeProvider].name}`, 'info');
            logToConsole(`模型: ${config.model}`, 'info');
            logToConsole(`提示词: "${prompt}"`, 'info');

            const startTime = Date.now();
            const complexity = parseInt(document.getElementById('param-complexity').value) || 300;
            const maxSize = parseInt(document.getElementById('param-max-size').value) || 32;

            try {
                const provider = PROVIDERS[activeProvider];
                
                // ===== STAGE 1: SHAPE =====
                const req1 = provider.buildRequest(1, config.key, config.model, prompt, null, config.baseUrl, complexity, maxSize);
                logToConsole(`[阶段一] 发送形状请求...`, 'data');
                
                const resp1 = await fetch(req1.url, {
                    method: 'POST', headers: req1.headers, body: JSON.stringify(req1.body)
                });
                
                if (!resp1.ok) {
                    const errText = await resp1.text();
                    throw new Error(`阶段一 API 失败 (${resp1.status})`);
                }
                
                const data1 = await resp1.json();
                const shapeResult = provider.parseResponse(data1);
                
                if (!shapeResult || !shapeResult.voxels || !Array.isArray(shapeResult.voxels)) {
                    throw new Error('阶段一未返回有效的体素数组 (voxels)');
                }
                
                const coords = shapeResult.voxels;
                logToConsole(`[阶段一] 成功生成 ${coords.length} 个白模坐标 (${Date.now() - startTime}ms)`, 'success');
                if (coords.length === 0) throw new Error('AI 返回了空的形状');
                
                // 暂时渲染白模
                const whiteModelData = coords.map(c => ({
                    x: c[0], y: c[1], z: c[2], color: 0xF0F0F0
                }));
                engine.loadModel(whiteModelData);
                document.getElementById('voxel-count').textContent = coords.length;
                
                // ===== STAGE 2: COLOR =====
                setGeneratingUI(true, `${PROVIDERS[activeProvider].name} 正在生成第二阶段(着色)...`);
                logToConsole(`[阶段二] 发送颜色映射请求...`, 'data');
                updateGenStatus('正在生成第二阶段(着色)...');
                
                const req2 = provider.buildRequest(2, config.key, config.model, prompt, coords, config.baseUrl, complexity, maxSize);
                
                const resp2 = await fetch(req2.url, {
                    method: 'POST', headers: req2.headers, body: JSON.stringify(req2.body)
                });
                
                if (!resp2.ok) {
                    const errText = await resp2.text();
                    throw new Error(`阶段二 API 失败 (${resp2.status})`);
                }
                
                const data2 = await resp2.json();
                const colorResult = provider.parseResponse(data2);
                
                if (!colorResult || !colorResult.colors) {
                    throw new Error('阶段二未返回有效的颜色映射 (colors)');
                }
                
                const colorMap = colorResult.colors;
                logToConsole(`[阶段二] 接收到着色数据 (${Date.now() - startTime}ms)`, 'success');
                
                // ===== ASSEMBLE =====
                updateGenStatus('正在渲染最终模型...');
                const finalVoxels = coords.map(c => {
                    const key1 = `[${c[0]},${c[1]},${c[2]}]`;
                    const key2 = `[${c[0]}, ${c[1]}, ${c[2]}]`;
                    let hexStr = colorMap[key1] || colorMap[key2] || '#CCCCCC';
                    if (hexStr.startsWith('#')) hexStr = hexStr.substring(1);
                    
                    return {
                        x: Math.round(Number(c[0]) || 0),
                        y: Math.round(Number(c[1]) || 0),
                        z: Math.round(Number(c[2]) || 0),
                        color: parseInt(hexStr, 16) || 0xCCCCCC
                    };
                });
                
                engine.loadModel(finalVoxels);
                document.getElementById('voxel-count').textContent = finalVoxels.length;

                const elapsedTotal = Date.now() - startTime;
                logToConsole(`✅ 生成完成！共 ${finalVoxels.length} 个体素，总耗时 ${elapsedTotal}ms`, 'success');
                showToast(`✨ 生成了 ${finalVoxels.length} 个体素`, 'success');
                
                document.getElementById('prompt-input').value = '';
                autoResizeTextarea(document.getElementById('prompt-input'));

            } catch (err) {
                const elapsed = Date.now() - startTime;
                logToConsole(`❌ 生成失败 (${elapsed}ms): ${err.message}`, 'error');
                showToast('生成失败: ' + err.message, 'error');
            } finally {
                isGenerating = false;
                document.getElementById('btn-generate').disabled = !document.getElementById('prompt-input').value.trim();
                setGeneratingUI(false);
                setConsoleLive(false);
            }
        }

        // ======================== BOOT ========================
        init();
    </script>
</body>

</html>
