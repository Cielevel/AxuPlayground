name: Deploy Playground to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir _site

          # Copy VoxelForge to root of site
          cp -r WebGround/VoxelForge/* _site/
          mv _site/VoxelForgeV2.html _site/index.html

          # Include MiniGames
          mkdir -p _site/MiniGames
          cp -r WebGround/MiniGames/* _site/MiniGames/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
