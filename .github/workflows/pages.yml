name: Deploy VoxelForge to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying static content
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir -p _site/VoxelForgeV2
          # Copy everything from VoxelForge folder to subdirectory
          cp -r WebGround/VoxelForge/* _site/VoxelForgeV2/
          # Rename VoxelForgeV2.html as the entry point
          mv _site/VoxelForgeV2/VoxelForgeV2.html _site/VoxelForgeV2/index.html

          mkdir -p _site/VoxelEditor
          # Copy VoxelEditor.html to subdirectory and rename to index.html
          cp WebGround/VoxelEditor.html _site/VoxelEditor/index.html

          mkdir -p _site/GameOfLife
          # Copy GameOfLife.html to subdirectory and rename to index.html
          cp WebGround/MiniGames/GameOfLife.html _site/GameOfLife/index.html

          mkdir -p _site/GameOfLifeMobile
          # Copy GameOfLifeMobile.html to subdirectory and rename to index.html
          cp WebGround/MiniGames/GameOfLifeMobile.html _site/GameOfLifeMobile/index.html

          mkdir -p _site/LeekFund
          # Copy LeekFund简易版.html to subdirectory and rename to index.html
          cp WebGround/SimplePage/LeekFund简易版.html _site/LeekFund/index.html

          mkdir -p _site/TransparentBrush
          # Copy 图片透明笔刷.html to subdirectory and rename to index.html
          cp WebGround/SimplePage/图片透明笔刷.html _site/TransparentBrush/index.html

          # Copy root index.html to site root
          cp index.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
