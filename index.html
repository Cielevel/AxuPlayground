<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXU Playground</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&display=swap');

        :root {
            /* 全新极致撞色板 */
            --clash-black: #0d0d0d;
            --clash-yellow: #ffe600;
            --clash-cyan: #00f0ff;
            --clash-pink: #ff0055;
            --clash-white: #f0f0f0;
            
            --mouse-x: 0;
            --mouse-y: 0;
            --shake-x: 0px;
            --shake-y: 0px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Anton', 'Impact', sans-serif;
            background-color: var(--clash-black);
            color: var(--clash-white);
            overflow: hidden;
            perspective: 1500px;
        }

        /* 全局震动容器 */
        #game-world {
            width: 100%;
            height: 100%;
            position: relative;
            transform: translate(var(--shake-x), var(--shake-y));
            transition: transform 0.05s ease-out;
        }

        /* --- 撞色背景系统 --- */
        .bg-layer {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            pointer-events: none;
        }

        /* 巨大的明黄斜切块 */
        .slash-yellow {
            background-color: var(--clash-yellow);
            clip-path: polygon(0 100%, 0 0, 70% 0, 40% 100%);
            z-index: 1;
            transform: translate(calc(var(--mouse-x) * -2%), calc(var(--mouse-y) * -2%));
        }

        /* 巨大的青色锐角切块 */
        .slash-cyan {
            background-color: var(--clash-cyan);
            clip-path: polygon(100% 0, 60% 0, 80% 100%, 100% 100%);
            z-index: 1;
            transform: translate(calc(var(--mouse-x) * 3%), calc(var(--mouse-y) * 3%));
        }

        /* 纯黑半调网点增加质感 */
        .halftone {
            background-image: radial-gradient(var(--clash-black) 25%, transparent 25%),
                              radial-gradient(var(--clash-black) 25%, transparent 25%);
            background-position: 0 0, 12px 12px;
            background-size: 24px 24px;
            opacity: 0.15;
            z-index: 2;
        }

        /* 背景巨型涂鸦文字 */
        .graffiti-text {
            position: absolute;
            font-family: 'Permanent Marker', cursive;
            font-size: 20vw;
            color: transparent;
            -webkit-text-stroke: 4px rgba(255, 255, 255, 0.05);
            z-index: 3;
            transform: rotate(-10deg) translate(calc(var(--mouse-x) * 5%), calc(var(--mouse-y) * 5%));
            white-space: nowrap;
            top: 5%;
            left: -10%;
            pointer-events: none;
        }

        /* --- 标题 --- */
        .header-container {
            position: absolute;
            top: 15%;
            left: 5%;
            z-index: 100;
            transform: translate(calc(var(--mouse-x) * 4%), calc(var(--mouse-y) * 4%)) rotate(-4deg);
        }

        h1 {
            font-size: 8rem;
            line-height: 0.85;
            text-transform: uppercase;
            color: var(--clash-white);
            /* 采用粉/青的双重色差错位阴影 */
            text-shadow: 
                6px 6px 0 var(--clash-black),
                12px 12px 0 var(--clash-pink),
                -4px -4px 0 var(--clash-cyan);
            letter-spacing: 2px;
            position: relative;
        }

        h1 span {
            color: var(--clash-yellow);
            font-size: 6rem;
            display: block;
            margin-top: -5px;
            text-shadow: 
                5px 5px 0 var(--clash-black),
                -3px -3px 0 var(--clash-cyan);
            transform: rotate(2deg);
        }

        /* --- 动态弧形卡片系统 --- */
        .archive-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            transform: translate(calc(var(--mouse-x) * -2%), calc(var(--mouse-y) * -2%));
        }

        .card {
            position: absolute;
            top: 50%;
            /* 锚点往右侧隐藏得深一点 */
            right: -80px; 
            left: auto;
            /* 尺寸缩小到 0.8 倍 */
            width: 960px;
            height: 256px;
            margin-top: -128px; /* 保持 Y 轴中心对齐 (height / 2) */
            margin-left: 0;
            background: var(--clash-black);
            border: 8px solid var(--clash-white); /* 边框等比缩小 */
            clip-path: polygon(0 0, 95% 5%, 100% 100%, 5% 95%);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 2.4rem 4rem; /* 内边距等比缩小 */
            transform-origin: 100% 50%; 
            will-change: transform, opacity;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease, background 0.2s, border-color 0.2s;
            box-shadow: -24px 24px 0 rgba(0,0,0,0.5); /* 阴影等比缩小 */
        }

        /* 卡片内部右侧撞色装饰块 */
        .card::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 65%;
            background: var(--clash-cyan);
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .card span.title {
            position: relative;
            z-index: 10;
            color: var(--clash-white);
            font-size: 6.8rem; /* 字体等比缩小 */
            line-height: 1;
            transform: rotate(-2deg);
            text-transform: uppercase;
            text-shadow: 5px 5px 0 var(--clash-pink); 
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .card span.status {
            position: absolute;
            right: 8%;
            top: 35%;
            z-index: 10;
            font-family: 'Permanent Marker', cursive;
            font-size: 3.6rem; /* 状态文本等比缩小 */
            color: var(--clash-black);
            transform: rotate(10deg);
        }

        /* 动态高亮状态 */
        .card.is-active {
            background: var(--clash-white);
            border-color: var(--clash-black);
        }
        
        .card.is-active span.title {
            color: var(--clash-black);
            text-shadow: 5px 5px 0 var(--clash-cyan);
        }

        .card.is-active::after {
            background: var(--clash-yellow);
        }

        .card.is-active span.status {
            color: var(--clash-pink);
        }

        /* 去除夸张的向左弹出，仅保留极其微小的悬停呼吸感 */
        .card.is-active:hover {
            transform: translateY(0) translateX(-20px) scale(1.02) rotate(0deg) !important;
        }

        /* 闪光特效层 */
        #flash-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--clash-white);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease-out;
            mix-blend-mode: overlay;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0; }

        @media (max-width: 768px) {
            h1 { font-size: 4.5rem; top: 5%; }
            h1 span { font-size: 3.5rem; }
            /* 移动端同步 0.8 倍缩放适配 */
            .card { width: 85vw; height: 160px; right: -20px; padding: 1rem 1.5rem; margin-top: -80px; border-width: 5px; }
            .card span.title { font-size: 2.8rem; }
            .card span.status { font-size: 1.6rem; right: 12%; }
            .card.is-active:hover { transform: translateY(0) translateX(-10px) scale(1.02) rotate(0deg) !important; }
        }
    </style>
</head>
<body>

    <div id="game-world">
        <!-- 狂暴背景层 (黑/黄/青撞色) -->
        <div class="bg-layer slash-yellow"></div>
        <div class="bg-layer slash-cyan"></div>
        <div class="bg-layer halftone"></div>
        <div class="graffiti-text">PLAYGROUND PLAYGROUND</div>

        <!-- 标题 -->
        <div class="header-container">
            <h1>AXU<br><span>PLAYGROUND</span></h1>
        </div>

        <!-- 垂直存档卡片流 -->
        <div class="archive-container" id="archive-list">
            <!-- 动态注入 -->
        </div>
    </div>

    <div id="flash-layer"></div>

    <script>
        // --- 1. 数据配置 ---
        const projects = [
            { name: "VOXEL FORGE", link: "VoxelForgeV2/", status: "CLR" },
            { name: "VOXEL EDITOR", link: "VoxelEditor/", status: "NEW" },
            { name: "LIFE (PC)", link: "GameOfLife/", status: "CLR" },
            { name: "LIFE (MOB)", link: "GameOfLifeMobile/", status: "NEW" },
            { name: "SNAKE", link: "Snake/", status: "CLR" },
            { name: "TETRIS", link: "Tetris/", status: "CLR" },
            { name: "PONG", link: "Pong/", status: "CLR" },
            { name: "TIC-TAC-TOE", link: "TicTacToe/", status: "NEW" },
            { name: "MINESWEEPER", link: "Minesweeper/", status: "CLR" },
            { name: "BREAKOUT", link: "Breakout/", status: "CLR" },
            { name: "FLAPPY BIRD", link: "FlappyBird/", status: "NEW" },
            { name: "2048", link: "2048/", status: "CLR" },
            { name: "MEMORY", link: "MemoryGame/", status: "CLR" },
            { name: "INVADERS", link: "SpaceInvaders/", status: "NEW" }
        ];

        // --- 2. 核心右侧弧形轮播算法 ---
        const archiveList = document.getElementById('archive-list');
        const gameWorld = document.getElementById('game-world');
        const flashLayer = document.getElementById('flash-layer');
        let currentIndex = 0;
        let isAnimating = false;

        // 初始化卡片 DOM
        projects.forEach((proj, index) => {
            const a = document.createElement('a');
            a.href = proj.link;
            a.className = 'card';
            // 去除黄色的 FILE 元素
            a.innerHTML = `
                <span class="title">${proj.name}</span>
                <span class="status">${proj.status}</span>
            `;
            
            a.addEventListener('click', (e) => {
                if (index !== currentIndex) {
                    e.preventDefault();
                    const diff = index - currentIndex;
                    if (Math.abs(diff) > projects.length / 2) {
                        navigate(Math.sign(diff) * -1);
                    } else {
                        navigate(Math.sign(diff));
                    }
                }
            });
            archiveList.appendChild(a);
        });

        const cards = document.querySelectorAll('.card');

        // 动态计算扇形弧度 (Parabolic Curve / 抛物线映射)
        function updateCardsTransform() {
            const total = cards.length;
            cards.forEach((card, i) => {
                let offset = i - currentIndex;
                if (offset > total / 2) offset -= total;
                if (offset < -total / 2) offset += total;

                card.classList.remove('is-active');
                card.style.pointerEvents = 'auto';

                if (offset === 0) {
                    // 【激活态】不再向左拔出，平稳停留在弧线的最顶点 (translateX: 0)
                    card.classList.add('is-active');
                    card.style.transform = `translateY(0px) translateX(0px) scale(1) rotate(0deg)`;
                    card.style.zIndex = 50;
                    card.style.opacity = 1;
                } else {
                    const sign = Math.sign(offset);
                    const absOffset = Math.abs(offset);
                    
                    // 垂直间距扩散：同步缩小到 0.8 倍 (180 * 0.8 = 144)
                    const yMove = offset * 144; 
                    
                    // X轴：向屏幕深处推入的力度同步缩小
                    const xMove = Math.pow(absOffset, 1.5) * 40; 
                    
                    // 旋转：保持原有的完美扇形弧度
                    const rotation = -offset * 12; 
                    
                    // 缩放透视
                    const scale = Math.max(0.35, 1 - (absOffset * 0.12)); 
                    
                    card.style.transform = `translateY(${yMove}px) translateX(${xMove}px) scale(${scale}) rotate(${rotation}deg)`;
                    card.style.zIndex = 40 - absOffset;
                    
                    card.style.opacity = Math.max(0, 1 - (absOffset * 0.2));
                    if (absOffset > 5) {
                        card.style.pointerEvents = 'none';
                    }
                }
            });
        }

        // --- 3. 视觉反馈系统 ---
        function screenShake() {
            const intensity = 8;
            const x = (Math.random() - 0.5) * intensity;
            const y = (Math.random() - 0.5) * intensity;
            gameWorld.style.setProperty('--shake-x', `${x}px`);
            gameWorld.style.setProperty('--shake-y', `${y}px`);
            setTimeout(() => {
                gameWorld.style.setProperty('--shake-x', '0px');
                gameWorld.style.setProperty('--shake-y', '0px');
            }, 50);
        }

        function flashScreen() {
            flashLayer.style.opacity = '1';
            setTimeout(() => flashLayer.style.opacity = '0', 40);
        }

        function navigate(direction) {
            if(isAnimating) return;
            isAnimating = true;

            screenShake();
            if(Math.random() > 0.5) flashScreen(); 

            const total = cards.length;
            currentIndex = (currentIndex + direction + total) % total;
            updateCardsTransform();

            setTimeout(() => { isAnimating = false; }, 150);
        }

        // --- 4. 交互绑定 ---
        document.addEventListener('wheel', (e) => {
            if(e.deltaY > 0) navigate(1); 
            else if(e.deltaY < 0) navigate(-1);
        });

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowDown' || e.key === 's') navigate(1);
            if(e.key === 'ArrowUp' || e.key === 'w') navigate(-1);
            if(e.key === 'Enter') {
                window.location.href = projects[currentIndex].link;
            }
        });

        // 平滑鼠标视差
        const root = document.documentElement;
        let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
        document.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth) * 2 - 1;
            targetY = (e.clientY / window.innerHeight) * 2 - 1;
        });

        function updateParallax() {
            currentX += (targetX - currentX) * 0.05;
            currentY += (targetY - currentY) * 0.05;
            root.style.setProperty('--mouse-x', currentX.toFixed(4));
            root.style.setProperty('--mouse-y', currentY.toFixed(4));
            requestAnimationFrame(updateParallax);
        }

        // 初始化执行
        updateCardsTransform();
        updateParallax();
    </script>
</body>
</html>
