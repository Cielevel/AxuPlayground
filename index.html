<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axu Playground</title>
    <style>
        :root {
            --text-color: #ffffff;
            --bg-base: #1a1a2e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Flowing colorful blurred background */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
            animation: moveBlob 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob:nth-child(1) {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #e94560;
            animation-delay: 0s;
        }

        .blob:nth-child(2) {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: #0f3460;
            animation-delay: -5s;
        }

        .blob:nth-child(3) {
            top: 40%;
            left: 40%;
            width: 40vw;
            height: 40vw;
            background: #16213e;
            animation-delay: -10s;
        }

        .blob:nth-child(4) {
            bottom: 10%;
            left: 10%;
            width: 30vw;
            height: 30vw;
            background: #533483;
            animation-delay: -15s;
        }

        @keyframes moveBlob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10vw, -10vh) scale(1.1); }
            66% { transform: translate(-10vw, 15vh) scale(0.9); }
            100% { transform: translate(5vw, 5vh) scale(1.05); }
        }

        /* Foreground Content */
        .content-container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 800px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        p.subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        a.project-link {
            text-decoration: none;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 400;
            padding: 1rem 3rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 80%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }

        a.project-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        a.project-link:active {
            transform: translateY(1px);
        }

    </style>
</head>
<body>

    <div class="background-container">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="content-container">
        <h1>Axu Playground</h1>
        <p class="subtitle">Experimental Projects & Mini-Tools</p>

        <div class="links-grid">
            <a href="VoxelForgeV2/" class="project-link">Voxel Forge</a>
            <a href="VoxelEditor/" class="project-link">Voxel Editor</a>
            <a href="GameOfLife/" class="project-link">Game of Life (PC)</a>
            <a href="GameOfLifeMobile/" class="project-link">Game of Life (Mobile)</a>
        </div>
    </div>

</body>
</html>
