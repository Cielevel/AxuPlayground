<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axu Playground</title>
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-deep: #000000;
            /* 鼠标坐标变量，由 JS 实时更新 */
            --mouse-x: 0;
            --mouse-y: 0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden; /* 沉浸式全屏 */
            perspective: 1000px;
        }

        /* 全局噪点纹理，增加超现实质感 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 深空流体背景 */
        .surreal-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            filter: blur(120px) saturate(150%);
            /* 根据鼠标进行轻微的反向视差移动 */
            transform: translate(calc(var(--mouse-x) * -3%), calc(var(--mouse-y) * -3%));
            transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.1, 1);
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.5;
            animation: orbFloat 25s infinite alternate ease-in-out;
        }

        /* 迷幻霓虹配色 */
        .orb:nth-child(1) { top: 30%; left: 30%; width: 50vw; height: 50vw; background: #ff0055; animation-delay: 0s; }
        .orb:nth-child(2) { top: 40%; right: 20%; width: 45vw; height: 45vw; background: #4a00e0; animation-delay: -5s; }
        .orb:nth-child(3) { bottom: 10%; left: 40%; width: 60vw; height: 60vw; background: #00e5ff; animation-delay: -10s; }
        .orb:nth-child(4) { top: 10%; right: 40%; width: 40vw; height: 40vw; background: #ffea00; animation-delay: -15s; opacity: 0.3; }

        @keyframes orbFloat {
            0% { transform: scale(1) translate(0, 0) rotate(0deg); }
            33% { transform: scale(1.3) translate(15vw, -10vh) rotate(120deg); }
            66% { transform: scale(0.8) translate(-10vw, 15vh) rotate(240deg); }
            100% { transform: scale(1.1) translate(5vw, 5vh) rotate(360deg); }
        }

        /* 内容层 */
        .scene {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 主容器正向视差 */
            transform-style: preserve-3d;
            transform: rotateX(calc(var(--mouse-y) * 10deg)) rotateY(calc(var(--mouse-x) * 10deg));
        }

        /* 标题组 */
        .header {
            text-align: center;
            margin-bottom: 5rem;
            transform: translateZ(80px); /* 3D 浮出效果 */
            pointer-events: auto;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #a3c2ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            cursor: default;
            transition: all 0.3s ease;
        }

        /* 标题悬停时的色散（Chromatic Aberration）故障效果 */
        h1:hover {
            text-shadow: 
                -4px 0px 0px rgba(255, 0, 85, 0.8),
                4px 0px 0px rgba(0, 229, 255, 0.8);
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 项目传送门网格布局：不规则的有机排列 */
        .portals-container {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            justify-content: center;
            max-width: 1000px;
            padding: 0 2rem;
            transform: translateZ(40px);
        }

        /* 超现实流体按钮 (Liquid Glassmorphism) */
        a.project-portal {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            width: 220px;
            height: 220px;
            text-align: center;
            padding: 2rem;
            
            /* 玻璃拟物态 */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            
            transition: border-color 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* 为不同的按钮添加各自的形状渐变(Morph)和浮动(Breathe)动画 */
        a.project-portal:nth-child(1) { animation: morph1 7s infinite alternate ease-in-out, portalBreathe 6s infinite alternate ease-in-out 0s; }
        a.project-portal:nth-child(2) { animation: morph2 8.5s infinite alternate ease-in-out, portalBreathe 7s infinite alternate ease-in-out -2s; }
        a.project-portal:nth-child(3) { animation: morph3 7.5s infinite alternate ease-in-out, portalBreathe 6.5s infinite alternate ease-in-out -4s; }
        a.project-portal:nth-child(4) { animation: morph4 9s infinite alternate ease-in-out, portalBreathe 8s infinite alternate ease-in-out -1s; }

        /* 形状缓慢渐变的关键帧 */
        @keyframes morph1 {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        @keyframes morph2 {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
        }
        @keyframes morph3 {
            0% { border-radius: 50% 50% 20% 80% / 25% 80% 20% 75%; }
            100% { border-radius: 20% 80% 50% 50% / 75% 20% 80% 25%; }
        }
        @keyframes morph4 {
            0% { border-radius: 80% 20% 50% 50% / 50% 50% 20% 80%; }
            100% { border-radius: 50% 50% 80% 20% / 20% 80% 50% 50%; }
        }

        @keyframes portalBreathe {
            0% { transform: translateY(0px) rotate(-2deg); }
            100% { transform: translateY(-15px) rotate(3deg); }
        }

        /* 内部文字容器 */
        a.project-portal span {
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 悬停时：仅高亮边缘并轻微提亮，不再强制变方或停止动画 */
        a.project-portal:hover {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(255, 255, 255, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.3);
        }

        a.project-portal:hover span {
            transform: scale(1.15);
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .scene { transform: none; } /* 移动端关闭 3D 旋转防止眩晕 */
            a.project-portal {
                width: 160px;
                height: 160px;
                font-size: 1.1rem;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 顶层噪点滤镜 -->
    <div class="noise-overlay"></div>

    <!-- 超现实背景层 -->
    <div class="surreal-bg">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- 3D 视差交互层 -->
    <div class="scene" id="scene">
        <div class="header">
            <h1>Axu Playground</h1>
            <p class="subtitle">Experimental Projects & Mini-Tools</p>
        </div>

        <div class="portals-container">
            <a href="VoxelForgeV2/" class="project-portal">
                <span>Voxel Forge</span>
            </a>
            <a href="VoxelEditor/" class="project-portal">
                <span>Voxel Editor</span>
            </a>
            <a href="GameOfLife/" class="project-portal">
                <span>Game of Life<br><small style="font-size:0.8em; opacity:0.7">(PC)</small></span>
            </a>
            <a href="GameOfLifeMobile/" class="project-portal">
                <span>Game of Life<br><small style="font-size:0.8em; opacity:0.7">(Mobile)</small></span>
            </a>
        </div>
    </div>

    <script>
        // 获取 CSS 变量作用域
        const root = document.documentElement;
        let requestRef;
        
        // 目标鼠标位置
        let targetX = 0;
        let targetY = 0;
        
        // 当前平滑插值后的位置
        let currentX = 0;
        let currentY = 0;

        // 监听鼠标移动，计算归一化坐标 (-1 到 1)
        document.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth) * 2 - 1;
            targetY = (e.clientY / window.innerHeight) * 2 - 1;
        });

        // 游戏程序员最熟悉的平滑插值 (Lerp) 更新循环
        function updateParallax() {
            // 平滑系数，越大越灵敏，越小越滞后/顺滑
            const lerpFactor = 0.05;
            
            currentX += (targetX - currentX) * lerpFactor;
            currentY += (targetY - currentY) * lerpFactor;

            // 将计算结果注入 CSS 变量
            root.style.setProperty('--mouse-x', currentX.toFixed(4));
            root.style.setProperty('--mouse-y', currentY.toFixed(4));

            requestRef = requestAnimationFrame(updateParallax);
        }

        // 启动循环
        updateParallax();
        
        // 当鼠标离开窗口时，缓慢回正
        document.addEventListener('mouseleave', () => {
            targetX = 0;
            targetY = 0;
        });
    </script>
</body>
</html>
